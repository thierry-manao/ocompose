services:
  # ─── WORKSPACE (mandatory) ───
  workspace:
    build:
      context: ./services/workspace
      dockerfile: Dockerfile
      args:
        WORKSPACE_USER: ${WORKSPACE_USER:-developer}
        WORKSPACE_UID: ${WORKSPACE_UID:-1000}
        WORKSPACE_GID: ${WORKSPACE_GID:-1000}
        WORKSPACE_SHELL: ${WORKSPACE_SHELL:-/bin/bash}
    container_name: ${PROJECT_NAME}_workspace
    hostname: ${PROJECT_NAME}-workspace
    volumes:
      - ./instances/${PROJECT_NAME}/www:/home/${WORKSPACE_USER:-developer}/workspace
      - ./instances/${PROJECT_NAME}/config/ssh/authorized_keys:/home/${WORKSPACE_USER:-developer}/.ssh/authorized_keys:ro
    ports:
      - "${WORKSPACE_SSH_PORT:-2222}:22"
    networks:
      - net
    stdin_open: true
    tty: true
    restart: unless-stopped

  # ─── PHP ───
  php:
    build:
      context: ./services/php
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
        PHP_EXTENSIONS: ${PHP_EXTENSIONS:-"mysql mbstring zip gd curl intl xml"}
    container_name: ${PROJECT_NAME}_php
    hostname: ${PROJECT_NAME}-php
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      # Generic DB vars
      DB_ENGINE: ${DB_ENGINE:-mysql}
      DB_HOST: ${DB_ENGINE:-mysql}
      DB_DATABASE: ${DB_DATABASE:-app_db}
      DB_USER: ${DB_USER:-app}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      # Backward-compat aliases (CI3 apps, legacy code)
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${DB_DATABASE:-app_db}
      MYSQL_USER: ${DB_USER:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      # CI3 overrides
      CI3_APP_ROOT: ${CI3_APP_ROOT:-}
      CI3_BASE_URL: ${CI3_BASE_URL:-}
      CI3_SESSION_SAVE_PATH: ${CI3_SESSION_SAVE_PATH:-}
      CI3_AUTH_URL: ${CI3_AUTH_URL:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
    volumes:
      - ./instances/${PROJECT_NAME}/www:/var/www/html
      - ./instances/${PROJECT_NAME}/config/php/php.ini:/etc/php/custom.ini
    networks:
      - net
    depends_on:
      - workspace
    restart: unless-stopped
    profiles:
      - php

  # ─── NODE.JS ───
  node:
    build:
      context: ./services/node
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
    container_name: ${PROJECT_NAME}_node
    hostname: ${PROJECT_NAME}-node
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      NODE_ENV: ${NODE_ENV:-development}
      NODE_COMMAND: ${NODE_COMMAND:-node server.js}
      DB_ENGINE: ${DB_ENGINE:-mysql}
      DB_HOST: ${DB_ENGINE:-mysql}
      DB_DATABASE: ${DB_DATABASE:-app_db}
      DB_USER: ${DB_USER:-app}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      # Backward-compat aliases
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${DB_DATABASE:-app_db}
      MYSQL_USER: ${DB_USER:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
    volumes:
      - ./instances/${PROJECT_NAME}/www:/var/www/html
    networks:
      - net
    depends_on:
      - workspace
    restart: unless-stopped
    profiles:
      - node

  # ─── PYTHON ───
  python:
    build:
      context: ./services/python
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
    container_name: ${PROJECT_NAME}_python
    hostname: ${PROJECT_NAME}-python
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      PYTHON_COMMAND: ${PYTHON_COMMAND:-python -m http.server 8000}
      DB_ENGINE: ${DB_ENGINE:-mysql}
      DB_HOST: ${DB_ENGINE:-mysql}
      DB_DATABASE: ${DB_DATABASE:-app_db}
      DB_USER: ${DB_USER:-app}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      # Backward-compat aliases
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${DB_DATABASE:-app_db}
      MYSQL_USER: ${DB_USER:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
    volumes:
      - ./instances/${PROJECT_NAME}/www:/var/www/html
    networks:
      - net
    depends_on:
      - workspace
    restart: unless-stopped
    profiles:
      - python

  # ─── NGINX ───
  nginx:
    image: nginx:1.27-alpine
    container_name: ${PROJECT_NAME}_nginx
    hostname: ${PROJECT_NAME}-nginx
    volumes:
      - ./instances/${PROJECT_NAME}/www:/var/www/html
      - ./instances/${PROJECT_NAME}/config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - net
    restart: unless-stopped
    profiles:
      - php
      - node
      - python
      - static

  # ─── MYSQL ───
  mysql:
    image: mysql:${DB_VERSION:-8.0}
    container_name: ${PROJECT_NAME}_mysql
    hostname: ${PROJECT_NAME}-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-app_db}
      MYSQL_USER: ${DB_USER:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./instances/${PROJECT_NAME}/config/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      net:
        aliases:
          - db
    restart: unless-stopped
    profiles:
      - mysql

  # ─── MARIADB ───
  mariadb:
    image: mariadb:${DB_VERSION:-10.11}
    container_name: ${PROJECT_NAME}_mariadb
    hostname: ${PROJECT_NAME}-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-app_db}
      MYSQL_USER: ${DB_USER:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./instances/${PROJECT_NAME}/config/mariadb/my.cnf:/etc/mysql/conf.d/custom.cnf
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      net:
        aliases:
          - db
          - mysql
    restart: unless-stopped
    profiles:
      - mariadb

  # ─── POSTGRESQL ───
  postgres:
    image: postgres:${DB_VERSION:-16}
    container_name: ${PROJECT_NAME}_postgres
    hostname: ${PROJECT_NAME}-postgres
    environment:
      POSTGRES_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      POSTGRES_DB: ${DB_DATABASE:-app_db}
      POSTGRES_USER: ${DB_USER:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      net:
        aliases:
          - db
    restart: unless-stopped
    profiles:
      - postgres

  # ─── REDIS ───
  redis:
    image: redis:${REDIS_VERSION:-7}-alpine
    container_name: ${PROJECT_NAME}_redis
    hostname: ${PROJECT_NAME}-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - net
    restart: unless-stopped
    profiles:
      - redis

  # ─── PHPMYADMIN (mysql/mariadb) ───
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ${PROJECT_NAME}_phpmyadmin
    hostname: ${PROJECT_NAME}-phpmyadmin
    environment:
      PMA_HOST: ${DB_ENGINE:-mysql}
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_ADMIN_PORT:-8080}:80"
    networks:
      - net
    restart: unless-stopped
    profiles:
      - phpmyadmin

  # ─── PGADMIN (postgres) ───
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ${PROJECT_NAME}_pgadmin
    hostname: ${PROJECT_NAME}-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-secret}
    ports:
      - "${DB_ADMIN_PORT:-5050}:80"
    networks:
      - net
    restart: unless-stopped
    profiles:
      - pgadmin

networks:
  net:
    name: ${PROJECT_NAME}_net
    driver: bridge

volumes:
  mysql_data:
    name: ${PROJECT_NAME}_mysql_data
    driver: local
  mariadb_data:
    name: ${PROJECT_NAME}_mariadb_data
    driver: local
  postgres_data:
    name: ${PROJECT_NAME}_postgres_data
    driver: local
  redis_data:
    name: ${PROJECT_NAME}_redis_data
    driver: local