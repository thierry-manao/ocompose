services:
  # ─── WORKSPACE (mandatory) ───
  workspace:
    build:
      context: ./services/workspace
      dockerfile: Dockerfile
      args:
        WORKSPACE_USER: ${WORKSPACE_USER:-developer}
        WORKSPACE_UID: ${WORKSPACE_UID:-1000}
        WORKSPACE_GID: ${WORKSPACE_GID:-1000}
        WORKSPACE_SHELL: ${WORKSPACE_SHELL:-/bin/bash}
    container_name: ${PROJECT_NAME}_workspace
    hostname: ${PROJECT_NAME}-workspace
    volumes:
      - ./instances/${PROJECT_NAME}/www:/home/${WORKSPACE_USER:-developer}/workspace
      - ./instances/${PROJECT_NAME}/config/ssh/authorized_keys:/home/${WORKSPACE_USER:-developer}/.ssh/authorized_keys:ro
    ports:
      - "${WORKSPACE_SSH_PORT:-2222}:22"
    networks:
      - net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    restart: unless-stopped

  # ─── PHP ───
  php:
    build:
      context: ./services/php
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
        PHP_EXTENSIONS: ${PHP_EXTENSIONS:-"mysql mbstring zip gd curl intl xml"}
    container_name: ${PROJECT_NAME}_php
    hostname: ${PROJECT_NAME}-php
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      # External DB connection (db-docker-server via host.docker.internal)
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-23306}
      DB_DATABASE: ${DB_DATABASE:-}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      # Backward-compat aliases (CI3 apps, legacy code)
      MYSQL_HOST: ${DB_HOST:-host.docker.internal}
      MYSQL_DATABASE: ${DB_DATABASE:-}
      MYSQL_USER: ${DB_USER:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      # CI3 overrides
      CI3_APP_ROOT: ${CI3_APP_ROOT:-}
      CI3_BASE_URL: ${CI3_BASE_URL:-}
      CI3_SESSION_SAVE_PATH: ${CI3_SESSION_SAVE_PATH:-}
      CI3_AUTH_URL: ${CI3_AUTH_URL:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
    volumes:
      - ./instances/${PROJECT_NAME}/www:/var/www/html
      - ./instances/${PROJECT_NAME}/config/php/php.ini:/etc/php/custom.ini
    networks:
      - net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - workspace
    restart: unless-stopped
    profiles:
      - php

  # ─── NODE.JS ───
  node:
    build:
      context: ./services/node
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
    container_name: ${PROJECT_NAME}_node
    hostname: ${PROJECT_NAME}-node
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      NODE_ENV: ${NODE_ENV:-development}
      NODE_COMMAND: ${NODE_COMMAND:-node server.js}
      # External DB connection (db-docker-server via host.docker.internal)
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-23306}
      DB_DATABASE: ${DB_DATABASE:-}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      # Backward-compat aliases
      MYSQL_HOST: ${DB_HOST:-host.docker.internal}
      MYSQL_DATABASE: ${DB_DATABASE:-}
      MYSQL_USER: ${DB_USER:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      REDIS_HOST: redis
    volumes:
      - ./instances/${PROJECT_NAME}/www:/var/www/html
    networks:
      - net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - workspace
    restart: unless-stopped
    profiles:
      - node

  # ─── PYTHON ───
  python:
    build:
      context: ./services/python
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
    container_name: ${PROJECT_NAME}_python
    hostname: ${PROJECT_NAME}-python
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      # External DB connection (db-docker-server via host.docker.internal)
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-23306}
      DB_DATABASE: ${DB_DATABASE:-}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      # Backward-compat aliases
      MYSQL_HOST: ${DB_HOST:-host.docker.internal}
      MYSQL_DATABASE: ${DB_DATABASE:-}
      MYSQL_USER: ${DB_USER:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      REDIS_HOST: redis
    volumes:
      - ./instances/${PROJECT_NAME}/www:/var/www/html
    networks:
      - net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - workspace
    restart: unless-stopped
    profiles:
      - python

  # ─── NGINX ───
  nginx:
    image: nginx:1.27-alpine
    container_name: ${PROJECT_NAME}_nginx
    hostname: ${PROJECT_NAME}-nginx
    volumes:
      - ./instances/${PROJECT_NAME}/www:/var/www/html
      - ./instances/${PROJECT_NAME}/config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - net
    restart: unless-stopped
    profiles:
      - php
      - node
      - python
      - static

  # ─── REDIS ───
  redis:
    image: redis:${REDIS_VERSION:-7}-alpine
    container_name: ${PROJECT_NAME}_redis
    hostname: ${PROJECT_NAME}-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - net
    restart: unless-stopped
    profiles:
      - redis

networks:
  net:
    name: ${PROJECT_NAME}_net
    driver: bridge

volumes:
  redis_data:
    name: ${PROJECT_NAME}_redis_data
    driver: local