# Nginx config for dual-port setup (main app + API)
# Port 80: Main application at /var/www/html/public
# Port 81: API at /var/www/html/api/public

# ─── Main Application (Port 80) ───
server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # Deny dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to protected directories
    location ~ ^/(application|system|archives|docs|table|api)/ {
        return 404;
    }

    # Static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # Main app — CI3 front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP handler for main app
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param CI_ENV development;
        include fastcgi_params;
    }
}

# ─── API (Port 81) ───
server {
    listen 81;
    server_name _;

    root /var/www/html/api/public;
    index index.php;

    charset utf-8;

    # Deny dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to protected directories
    location ~ ^/(application|system|core|database)/ {
        return 404;
    }

    # Static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # API — CI3 front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP handler for API
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param CI_ENV development;
        include fastcgi_params;
    }
}
